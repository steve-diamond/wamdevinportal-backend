name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
    env:
      PORT: 5000
      MONGO_URI: mongodb://127.0.0.1:27017/wamdin_ci
      JWT_SECRET: ci-jwt-secret
      CLIENT_URL: http://localhost:3000
      EMAIL_USER: ci@example.com
      EMAIL_PASS: ci-password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate server.js syntax
        run: node --check server.js

      - name: Validate index.js syntax
        run: node --check index.js

      - name: Start backend
        run: npm start &

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:5000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become healthy"
          exit 1

      - name: Run flow smoke checks
        run: npm run smoke:flows
